{% extends 'base.html' %}

{% block title %}MakanMetrics | Home{% endblock %}

{% block content %}
<section class="hero" id="about">
    <div class="container">
        <h1>Discover Singapore's Best Hawker Food</h1>
        <p class="hero-sub">Search thousands of opinions on your favorite hawker dishes</p>

        <form class="search-wrap" action="{% url 'search_results' %}" method="get">
            <input type="text" name="q" placeholder="Search for hawker dishes, stalls, or food centres..." required>
            <button type="submit" aria-label="Search">Search</button>
        </form>

        <div class="quick-row">
            <span>Try:</span>
            {% for prompt in quick_queries %}
                <button class="quick-query" type="button" data-query="{{ prompt }}">{{ prompt }}</button>
            {% endfor %}
        </div>
    </div>
</section>

{% endblock %}
