{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MakanMetrics{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="topbar">
        <div class="container topbar-inner">
            <a class="brand" href="{% url 'home' %}">
                <span class="brand-mark">MM</span>
                <span class="brand-text">MakanMetrics</span>
            </a>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
    
    <script src="{% static 'js/site.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
